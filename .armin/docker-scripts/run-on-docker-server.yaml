# Remote deploy settings — scripts read this file only (no CLI -- flags).
# Non-empty override fields replace values from compose_file / dockerfile.
# Fill ssh before running. Behind reverse proxy: leave publish_port empty.
# HAProxy (t3): dogan.xaigrok.ir → dogan-webui:80.

stack_name: dogan-webui
image_tag: dogan-webui:latest
compose_file: ../../docker-compose.yml
dockerfile: ../../Dockerfile
docker_network: t3-net
internal_port: ""
publish_port: ""
delete_volume: "no"
delete_image: "yes"
build_image_on: "local"  # local = build here and upload; server = build on remote

ssh: "ssh <alias>"

volume_dir: "/home/<user>/docker/dogan-webui"
